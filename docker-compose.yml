# Development-only compose file. Do NOT use in production.
# Copy .env.example to .env and fill in secrets before starting:
#   cp .env.example .env && php artisan key:generate
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-app
    working_dir: /var/www
    volumes:
      - ".:/var/www"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-accounting}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8000:8000"
    networks:
      - accounting-network
    depends_on:
      postgres:
        condition: service_healthy
    tty: true

  # Database for testing and development
  postgres:
    image: postgres:18
    container_name: accounting-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-accounting}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - accounting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sail} -d ${DB_DATABASE:-accounting}"]
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    driver: local

networks:
  accounting-network:
    driver: bridge
